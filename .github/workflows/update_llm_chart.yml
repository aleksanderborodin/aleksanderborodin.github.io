name: Update LLM Chart

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate chart
        env:
          ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
        run: |
          python3 scripts/generate_pareto_llm_chart.py \
            --template projects/llm_chart.html \
            --output projects/llm_chart.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/llm_chart.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update LLM chart"
            git push
          fi
